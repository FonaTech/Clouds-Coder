name: Python Publish

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*"

jobs:
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install . --no-deps

      - name: Run tests
        run: python -m pytest -q

  build:
    name: Build Dist
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          # 清理旧缓存并构建
          rm -rf dist build *.egg-info
          python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    # 仅在推送标签（Tag）时执行发布动作
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write  # 必须具备此权限才能通过 Trusted Publishing 验证身份
    environment:
      name: pypi       # 必须与 PyPI 后台配置的 Environment Name 一致
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # skip-existing: true 可以防止因为版本号重复导致的整个任务崩溃
          skip-existing: true
          packages-dir: dist/
